[output]
# Base output directory. CLI `-o/--output` overrides this value.
directory = "output"

# When false, MagicMD appends a short content hash if the package directory exists.
overwrite = false

# Options: "always", "on_failure", "never".
save_debug_html = "on_failure"

[output.naming]
# Package directory relative to `output.directory`.
package = "{date}-{slug}"
markdown = "article.md"
metadata = "metadata.json"
report = "extraction-report.json"
docx = "article.docx"

[markdown]
# Presets: "default", "plain", "hugo", "docusaurus".
preset = "default"

# Compatibility alias. `clean` keeps front matter and title, but hides the source block.
template = "default"

# Current options: "yaml", "none".
front_matter = "yaml"
include_title = true
include_source_block = true

# Shift generated Markdown heading levels. Example: 1 turns `##` into `###`.
heading_offset = 0

source_block_template = """
> Source: {platform}
> Author: {author}
> Original: {source_url}
"""

[markdown.front_matter_fields]
title = "{title}"
author = "{author}"
platform = "{platform}"
source_url = "{source_url}"
published_at = "{published_at}"

[images]
download = true
directory = "images"
filename_pattern = "img_{index:03d}.{ext}"
markdown_path = "{directory}/{filename}"
concurrency = 5

[videos]
download = true
directory = "videos"
filename_pattern = "video_{index:03d}.{ext}"
markdown_path = "{directory}/{filename}"

[docx]
# Generate article.docx in addition to the Markdown package.
# Requires pandoc. CLI `--format docx` overrides this for one run.
enabled = false
pandoc_path = "pandoc"
reference_doc = ""

[fetch]
timeout_seconds = 20
browser_timeout_seconds = 15
browser_attempts = 2
user_agent = "default"

[ui]
# CLI terminal language. Options: "zh-CN", "en-US".
language = "zh-CN"

[platforms.wechat]
enabled = true
browser = "camoufox"
wait_selector = "#js_content"

[platforms.juejin]
enabled = true
browser = "camoufox"
wait_selector = "article"

[platforms.csdn]
enabled = true
browser = "camoufox"
wait_selector = "#content_views"

[platforms.generic]
enabled = true
browser = "http"
